worker_processes auto;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  lua_shared_dict keys 1m;

  lua_package_path "/usr/local/openresty/nginx/conf/?.lua;;";

  init_worker_by_lua_block {
    local config = require("config")
    local shared = ngx.shared.keys
    shared:set("rr_index", 0)
    for _, key in ipairs(config.API_KEYS) do
      shared:delete("disabled:" .. key)
    end
  }

  server {
    listen 80;
    access_log /dev/stderr;

    location /v1 {
      access_by_lua_file /usr/local/openresty/nginx/conf/proxy.lua;

      proxy_buffering off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass https://ollama.com;

      log_by_lua_block {
        if ngx.status == 429 and ngx.ctx.picked_key then
          ngx.shared.keys:set("disabled:" .. ngx.ctx.picked_key, ngx.now(), 300)
        end
      }
    }
  }
}