worker_processes auto;

error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  lua_shared_dict keys 1m;

  # Rate limiting: 10 requests per second, burst 20
  limit_req_zone $binary_remote_addr zone=ollama:10m rate=10r/s;

  # Max request body size (10MB for file uploads)
  client_max_body_size 10m;

  lua_package_path "/tmp/ollagate/?.lua;/usr/local/openresty/nginx/conf/?.lua;;";

  init_by_lua_block {
    local shared = ngx.shared.keys
    shared:set("req_200", 0)
    shared:set("req_401", 0)
    shared:set("req_429", 0)
    shared:set("req_503", 0)
    shared:set("key_rotations", 0)
    shared:set("nginx_start_time", ngx.time())
  }

  init_worker_by_lua_block {
    local config = require("config")
    local shared = ngx.shared.keys
    shared:set("rr_index", 0)
    for _, key in ipairs(config.API_KEYS) do
      shared:delete("disabled:" .. key)
    end
  }

  server {
    listen 80;
    access_log off;

    location /v1 {
      # Rate limiting: 10r/s with burst 20 (nodelay for streaming)
      limit_req zone=ollama burst=20 nodelay;

      access_by_lua_block {
        local proxy = require("proxy")

        proxy.check_auth()

        local key = proxy.get_active_key()
        if not key then
          ngx.status = 503
          ngx.header["Content-Type"] = "application/json"
          ngx.say('{"error":"all keys rate limited"}')
          ngx.shared.keys:incr("req_503", 1, 0)
          return ngx.exit(503)
        end

        ngx.ctx.picked_key = key
        ngx.shared.keys:incr("key_rotations", 1, 0)
        ngx.req.set_header("Authorization", "Bearer " .. key)

        local cjson = require("cjson.safe")
        ngx.req.read_body()
        local body = ngx.req.get_body_data()
        if body then
          local ok, data = pcall(cjson.decode, body)
          if ok and data and data.model then
            ngx.ctx.model = data.model
          elseif not ok then
            io.stderr:write("[proxy] warn: JSON decode failed: " .. tostring(data) .. "\n")
            io.stderr:flush()
          end
        end
        ngx.ctx.start_time = ngx.now()
      }

      client_body_buffer_size 1m;

      resolver 8.8.8.8 8.8.4.4 valid=30s;
      proxy_buffering off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass https://ollama.com;

      body_filter_by_lua_block {
        if ngx.status == 429 then
          local chunk = ngx.arg[1]
          if chunk then
            local existing = ngx.ctx.rate_limit_body or ""
            if #existing < 512 then
              ngx.ctx.rate_limit_body = existing .. string.sub(chunk, 1, 512 - #existing)
            end
          end
        end
      }

      log_by_lua_block {
        local config = require("config")
        local req_status = ngx.status
        if req_status == 429 and ngx.ctx.picked_key then
          local body = ngx.ctx.rate_limit_body or ""
          local is_weekly = config.WEEKLY_LIMIT_COOLDOWN_MODE
                           and body:find("weekly usage limit", 1, true)

          local ttl = is_weekly and require("timeutil").seconds_until_monday_midnight()
                      or config.RATE_LIMIT_COOLDOWN

          local added = ngx.shared.keys:add("disabled:" .. ngx.ctx.picked_key, ngx.now(), ttl)
          if added then
            ngx.shared.keys:incr("req_429", 1, 0)
          end
        elseif req_status == 200 then
          ngx.shared.keys:incr("req_200", 1, 0)
        end

        local model = ngx.ctx.model or "unknown"

        local elapsed_sec = ngx.now() - ngx.req.start_time()
        local time_str
        if elapsed_sec >= 1 then
          time_str = string.format("%.2fs", elapsed_sec)
        else
          time_str = string.format("%dms", math.floor(elapsed_sec * 1000))
        end

        local timestamp = os.date("%Y-%m-%d %H:%M:%S")
        local msg = string.format(
          "%s | %s | %d | %s | api key: %s",
          timestamp, model, req_status, time_str, ngx.ctx.picked_key and string.sub(ngx.ctx.picked_key, 1, 8) .. "..." or "no-key"
        )
        io.stderr:write(msg .. "\n")
        io.stderr:flush()
      }
    }

    location /metrics {
      content_by_lua_file /usr/local/openresty/nginx/conf/metrics.lua;
      access_log off;
    }

    location /health {
      content_by_lua_block {
        local config = require("config")
        local shared = ngx.shared.keys
        local active = 0
        for _, key in ipairs(config.API_KEYS) do
          if not shared:get("disabled:" .. key) then
            active = active + 1
          end
        end
        ngx.header["Content-Type"] = "application/json"
        ngx.say('{"status":"ok","active_keys":' .. active .. '}')
      }
      access_log off;
    }
  }
}
